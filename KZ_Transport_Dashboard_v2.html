function IndustrializationMap() {
  const [hov,setHov]=useState(null);
  const [mp,setMp]=useState({x:0,y:0});
  const [cm,setCm]=useState("sector");
  const proj=useMemo(()=>d3.geoMercator().center([67,48.5]).scale(1050).translate([MW/2,MH/2]),[]);
  const pathGen=useMemo(()=>d3.geoPath().projection(proj),[proj]);
  const maxInd=Math.max(...GEO.features.map(f=>f.properties.t));
  const maxGrp=Math.max(...GEO.features.map(f=>f.properties.g));
  const getColor=useCallback((p,isH)=>{
    const base=(()=>{if(cm==="sector")return SECTOR_COLORS[p.k]||"#B0BEC5";if(cm==="industry")return d3.interpolateYlOrRd(0.15+p.t/maxInd*0.7);return d3.interpolateYlGnBu(0.15+p.g/maxGrp*0.75)})();
    return isH?d3.color(base).brighter(0.4).toString():base;
  },[cm,maxInd,maxGrp]);
  const cPaths=MAP_CORRIDORS.map(c=>{const pts=c.coords.map(([lon,lat])=>proj([lon,lat]));return{...c,d:d3.line().curve(d3.curveCardinal.tension(0.4))(pts)}});
  const nPos=MAP_NODES.map(n=>{const[x,y]=proj([n.lon,n.lat]);return{...n,x,y}});
  const onMM=(e,p)=>{const r=e.currentTarget.closest("svg").getBoundingClientRect();setMp({x:e.clientX-r.left,y:e.clientY-r.top});setHov(p)};

  return(<div>
    <SectionTitle number={5} title="Карта индустриализации" subtitle="Промышленная специализация регионов и транспортные коридоры"/>
    <div className="rounded-xl p-4 mb-6" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div className="flex gap-1">
          {[{id:"sector",label:"Специализация"},{id:"industry",label:"Промпроизводство"},{id:"grp",label:"ВРП"}].map(b=>(
            <button key={b.id} onClick={()=>setCm(b.id)} className="px-3 py-1.5 rounded-md text-xs font-medium cursor-pointer" style={{background:cm===b.id?NAVY:"#F0F2F5",color:cm===b.id?"#fff":MUTED}}>{b.label}</button>
          ))}
        </div>
        <div className="flex flex-wrap gap-x-3 gap-y-1">
          {MAP_CORRIDORS.filter(c=>!c.name.includes("Достык")).map(c=>(<div key={c.name} className="flex items-center gap-1 text-xs"><svg width="16" height="6"><line x1="0" y1="3" x2="16" y2="3" stroke={c.color} strokeWidth="2" strokeDasharray={c.dash}/></svg><span style={{color:MUTED}}>{c.name}</span></div>))}
        </div>
      </div>
      <div className="relative">
        <svg viewBox={"0 0 "+MW+" "+MH} style={{width:"100%",height:"auto"}}>
          <defs><filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
          {GEO.features.map((feat,i)=>{const p=feat.properties;const isH=hov?.n===p.n;return(<path key={i} d={pathGen(feat.geometry)} fill={getColor(p,isH)} stroke={isH?"#fff":"rgba(255,255,255,0.5)"} strokeWidth={isH?2:0.5} style={{cursor:"pointer",transition:"fill 0.2s"}} onMouseMove={(e)=>onMM(e,p)} onMouseLeave={()=>setHov(null)}/>)})}
          {cPaths.map((c,i)=>(<path key={i} d={c.d} fill="none" stroke={c.color} strokeWidth={2.5} strokeDasharray={c.dash} opacity={0.85} filter="url(#glow)"/>))}
          {nPos.map((n,i)=>{const sz=n.type==="city"?5:4;return(<g key={i}>
            {n.type==="city"&&<circle cx={n.x} cy={n.y} r={sz} fill="#fff" stroke={NAVY} strokeWidth={1.5}/>}
            {n.type==="port"&&<rect x={n.x-sz} y={n.y-sz} width={sz*2} height={sz*2} fill="#fff" stroke={AMBER} strokeWidth={1.5} rx={1}/>}
            {n.type==="border"&&<polygon points={n.x+","+(n.y-sz-1)+" "+(n.x+sz)+","+(n.y+sz-1)+" "+(n.x-sz)+","+(n.y+sz-1)} fill="#fff" stroke="#E74C3C" strokeWidth={1.5}/>}
            {n.type==="junction"&&<circle cx={n.x} cy={n.y} r={3} fill={NAVY} stroke="#fff" strokeWidth={1}/>}
            <text x={n.x} y={n.y-8} textAnchor="middle" fill="#fff" fontSize="8" fontWeight="700" style={{textShadow:"0 0 4px rgba(0,0,0,0.7), 0 1px 2px rgba(0,0,0,0.9)"}}>{n.name}</text>
          </g>)})}
          {GEO.features.filter(f=>!f.properties.n.startsWith("г.")).map((feat,i)=>{const p=feat.properties;const[cx,cy]=proj(p.c);return(<text key={i} x={cx} y={cy+3} textAnchor="middle" fill="rgba(255,255,255,0.85)" fontSize="7.5" fontWeight="700" style={{pointerEvents:"none",textShadow:"0 1px 2px rgba(0,0,0,0.5)"}}>{p.n.length>12?p.n.slice(0,10)+"…":p.n}</text>)})}
        </svg>
        {hov&&(<div className="absolute rounded-lg p-3 shadow-xl" style={{left:Math.min(mp.x+12,MW-210),top:mp.y-10,background:DARK,color:"#fff",fontSize:11,minWidth:180,maxWidth:220,pointerEvents:"none",zIndex:10}}>
          <div className="font-bold text-sm mb-2" style={{color:AMBER}}>{hov.n}</div>
          <div className="flex justify-between mb-1"><span style={{color:"#8BAFD4"}}>ВРП 2024:</span><span className="font-bold">{(hov.g/1000).toFixed(1)} трлн ₸</span></div>
          <div className="flex justify-between mb-1"><span style={{color:"#8BAFD4"}}>Промышленность:</span><span className="font-bold">{(hov.t/1000).toFixed(1)} трлн ₸</span></div>
          <div className="mt-2 pt-2" style={{borderTop:"1px solid rgba(255,255,255,0.15)"}}>
            <div className="flex justify-between mb-1"><span style={{color:"#8BAFD4"}}>Добыча:</span><span>{((hov.m/hov.t)*100||0).toFixed(0)}%</span></div>
            <div className="flex justify-between mb-1"><span style={{color:"#8BAFD4"}}>Обработка:</span><span>{((hov.f/hov.t)*100||0).toFixed(0)}%</span></div>
          </div>
          <div className="mt-2 text-xs" style={{color:AMBER}}>{hov.d}</div>
        </div>)}
      </div>
      <div className="flex flex-wrap items-center gap-x-4 gap-y-1 mt-3 pt-3" style={{borderTop:"1px solid #E8ECF0"}}>
        {cm==="sector"&&Object.entries(SECTOR_LABELS).map(([k,l])=>(<div key={k} className="flex items-center gap-1.5 text-xs"><span className="w-3 h-3 rounded-sm" style={{background:SECTOR_COLORS[k]}}/><span style={{color:MUTED}}>{l}</span></div>))}
        {cm==="industry"&&<div className="flex items-center gap-2 text-xs"><span style={{color:MUTED}}>Промпроизводство:</span><div className="flex h-3 w-32 rounded-sm overflow-hidden">{[0.15,0.3,0.45,0.6,0.75,0.85].map((v,i)=>(<div key={i} className="flex-1" style={{background:d3.interpolateYlOrRd(v)}}/>))}</div><span style={{color:MUTED}}>мин → макс</span></div>}
        {cm==="grp"&&<div className="flex items-center gap-2 text-xs"><span style={{color:MUTED}}>ВРП:</span><div className="flex h-3 w-32 rounded-sm overflow-hidden">{[0.15,0.3,0.45,0.6,0.75,0.9].map((v,i)=>(<div key={i} className="flex-1" style={{background:d3.interpolateYlGnBu(v)}}/>))}</div><span style={{color:MUTED}}>мин → макс</span></div>}
        <div className="ml-auto flex items-center gap-3 text-xs">
          <span className="flex items-center gap-1"><svg width="8" height="8"><circle cx="4" cy="4" r="3.5" fill="#fff" stroke={NAVY} strokeWidth="1"/></svg> Город</span>
          <span className="flex items-center gap-1"><svg width="8" height="8"><rect x="1" y="1" width="6" height="6" fill="#fff" stroke={AMBER} strokeWidth="1" rx="0.5"/></svg> Порт</span>
          <span className="flex items-center gap-1"><svg width="8" height="8"><polygon points="4,0.5 7.5,7 0.5,7" fill="#fff" stroke="#E74C3C" strokeWidth="1"/></svg> Погранпереход</span>
        </div>
      </div>
    </div>
  </div>);
}

// ═══════════════════════════════════════════════════════
// MAIN DASHBOARD
// ═══════════════════════════════════════════════════════
function App() {
  const [activeCorr,setActiveCorr]=useState("COR-01");
  const freight2024=FREIGHT_BY_MODE.find(f=>f.year===2024);
  const totalFreight=freight2024.rail+freight2024.auto+freight2024.pipe+freight2024.sea+freight2024.air+freight2024.water;
  const pieData=[
    {name:"ЖД",value:freight2024.rail,color:CHART_COLORS[0]},
    {name:"Авто",value:freight2024.auto,color:CHART_COLORS[1]},
    {name:"Трубопровод",value:freight2024.pipe,color:CHART_COLORS[2]},
    {name:"Море",value:freight2024.sea,color:CHART_COLORS[3]},
    {name:"Авиа",value:freight2024.air,color:CHART_COLORS[4]},
  ];
  const activeCorrData=CORR_INFO.find(c=>c.id===activeCorr);
  const fmtPct=(v)=>{const p=v/totalFreight*100; return p<1?p.toFixed(1):p.toFixed(0)};

  return(
    <div className="min-h-screen" style={{background:LIGHT_BG,fontFamily:"'Segoe UI','Helvetica Neue',sans-serif"}}>
      {/* HERO */}
      <div className="relative overflow-hidden" style={{background:"linear-gradient(135deg, "+DARK+" 0%, "+NAVY+" 60%, #2E6B9E 100%)"}}>
        <div className="absolute inset-0 opacity-5" style={{backgroundImage:"url(\"data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 30h60M30 0v60' stroke='%23fff' stroke-width='.5' fill='none'/%3E%3C/svg%3E\")"}}/>
        <div className="max-w-6xl mx-auto px-6 py-10 relative">
          <div className="flex items-center gap-2 mb-1"><div className="w-8 h-1 rounded" style={{background:AMBER}}/><span className="text-xs font-bold tracking-widest uppercase" style={{color:AMBER}}>Республика Казахстан</span></div>
          <h1 className="text-3xl font-bold text-white mb-1">Транспортная отрасль</h1>
          <p className="text-sm mb-8" style={{color:"#8BAFD4"}}>Обзор ключевых показателей на основе открытых данных · 2018–2024</p>
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <StatCard accent label="Грузооборот" value="514.5" unit="млрд т-км" sub="+2.6% к 2023"/>
            <StatCard accent label="Перевезено грузов" value="1 079" unit="млн тонн" sub="Все виды транспорта"/>
            <StatCard accent label="ЖД сеть" value="16 636" unit="км" sub="4-е место в Азии"/>
            <StatCard accent label="Транзит" value="21.3" unit="млн тонн" sub="×2.6 с 2013 года"/>
          </div>
        </div>
      </div>

      <div className="max-w-6xl mx-auto px-6 pb-10">
        {/* S1: Transport Structure */}
        <SectionTitle number={1} title="Структура грузоперевозок" subtitle="Распределение по видам транспорта и динамика за 7 лет"/>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div className="rounded-xl p-5 col-span-1" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
            <h3 className="text-xs font-bold uppercase tracking-wider mb-4" style={{color:MUTED}}>Доли модов, 2024</h3>
            <ResponsiveContainer width="100%" height={200}>
              <PieChart><Pie data={pieData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={2} dataKey="value">{pieData.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip content={<CustomTooltip/>}/></PieChart>
            </ResponsiveContainer>
            <div className="flex flex-wrap gap-x-4 gap-y-1 mt-2 justify-center">
              {pieData.map((d,i)=>(<div key={i} className="flex items-center gap-1 text-xs"><span className="w-2 h-2 rounded-full" style={{background:d.color}}/><span style={{color:MUTED}}>{d.name} {fmtPct(d.value)}%</span></div>))}
            </div>
          </div>
          <div className="rounded-xl p-5 col-span-2" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
            <h3 className="text-xs font-bold uppercase tracking-wider mb-4" style={{color:MUTED}}>Грузооборот по видам транспорта, млрд т-км</h3>
            <ResponsiveContainer width="100%" height={230}>
              <AreaChart data={TURNOVER_BY_MODE}><CartesianGrid strokeDasharray="3 3" stroke="#E8ECF0"/><XAxis dataKey="year" tick={{fill:MUTED,fontSize:11}}/><YAxis tick={{fill:MUTED,fontSize:11}} tickFormatter={v=>(v/1000).toFixed(0)}/><Tooltip content={<CustomTooltip/>}/>
                <Area type="monotone" dataKey="rail" name="ЖД" stackId="1" fill={CHART_COLORS[0]} stroke={CHART_COLORS[0]} fillOpacity={0.8}/>
                <Area type="monotone" dataKey="pipe" name="Трубопровод" stackId="1" fill={CHART_COLORS[2]} stroke={CHART_COLORS[2]} fillOpacity={0.7}/>
                <Area type="monotone" dataKey="auto" name="Авто" stackId="1" fill={CHART_COLORS[1]} stroke={CHART_COLORS[1]} fillOpacity={0.7}/>
                <Area type="monotone" dataKey="sea" name="Море" stackId="1" fill={CHART_COLORS[3]} stroke={CHART_COLORS[3]} fillOpacity={0.6}/>
              </AreaChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* S2: Transit */}
        <SectionTitle number={2} title="Транзитный потенциал" subtitle="Казахстан — ключевое звено сухопутных коридоров Восток–Запад и Север–Юг"/>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          <div className="rounded-xl p-5 col-span-2" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
            <h3 className="text-xs font-bold uppercase tracking-wider mb-4" style={{color:MUTED}}>Общий транзит vs. поток TTM (Средний коридор), тыс. тонн</h3>
            <ResponsiveContainer width="100%" height={250}>
              <AreaChart data={TRANSIT_MERGED}><CartesianGrid strokeDasharray="3 3" stroke="#E8ECF0"/><XAxis dataKey="year" tick={{fill:MUTED,fontSize:11}}/><YAxis tick={{fill:MUTED,fontSize:11}} tickFormatter={v=>fmt(v)}/><Tooltip content={<CustomTooltip/>}/>
                <Area type="monotone" dataKey="total" name="Всего транзит" fill={NAVY} stroke={NAVY} fillOpacity={0.15} strokeWidth={2}/>
                <Area type="monotone" dataKey="rail" name="ЖД транзит" fill={CHART_COLORS[2]} stroke={CHART_COLORS[2]} fillOpacity={0.1} strokeWidth={2} strokeDasharray="5 3"/>
                <Area type="monotone" dataKey="ttm" name="Прокси TTM (Китай→Кавказ+ЕС)" fill={AMBER} stroke={AMBER} fillOpacity={0.3} strokeWidth={2.5}/>
              </AreaChart>
            </ResponsiveContainer>
            <p className="text-xs mt-2 italic" style={{color:MUTED}}>* Прокси TTM = транзит Китай → (Азербайджан + Грузия + Турция + ЕС). Верхняя оценка, так как часть потока может идти через Северный коридор.</p>
          </div>
          <div className="flex flex-col gap-3 col-span-1">
            <div className="rounded-xl p-4 flex-1" style={{background:NAVY}}><span className="text-xs font-medium" style={{color:"#8BAFD4"}}>Рост транзита 2013→2024</span><div className="text-3xl font-bold text-white mt-2">×2.6</div><span className="text-xs" style={{color:AMBER}}>8.2 → 21.3 млн тонн</span></div>
            <div className="rounded-xl p-4 flex-1" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}><span className="text-xs font-medium" style={{color:MUTED}}>Доля ЖД в транзите</span><div className="text-3xl font-bold mt-2" style={{color:NAVY}}>62%</div><span className="text-xs" style={{color:MUTED}}>13.3 млн тонн — ЖД</span></div>
            <div className="rounded-xl p-4 flex-1" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}><span className="text-xs font-medium" style={{color:MUTED}}>Китай — доминант</span><div className="text-3xl font-bold mt-2" style={{color:NAVY}}>72%</div><span className="text-xs" style={{color:MUTED}}>15.4 млн т — транзит из КНР</span></div>
          </div>
        </div>

        {/* S3: Corridors */}
        <SectionTitle number={3} title="Транспортные коридоры" subtitle="Ключевые маршруты через территорию Казахстана"/>
        <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
          {CORR_INFO.map(c=>(<button key={c.id} onClick={()=>setActiveCorr(c.id)} className="rounded-xl p-4 text-left cursor-pointer" style={{background:activeCorr===c.id?NAVY:CARD_BG,border:activeCorr===c.id?"2px solid "+AMBER:"1px solid #E8ECF0",transform:activeCorr===c.id?"scale(1.02)":"scale(1)",transition:"all 0.2s"}}>
            <div className="flex items-center justify-between mb-2"><span className="w-2 h-2 rounded-full" style={{background:STATUS_COLORS[c.status]}}/><span className="text-xs px-2 py-0.5 rounded-full" style={{background:activeCorr===c.id?"rgba(245,166,35,0.2)":"#F0F2F5",color:activeCorr===c.id?AMBER:MUTED,fontSize:10}}>{c.status==="active"?"Действующий":c.status==="disrupted"?"Нарушен":"Планируется"}</span></div>
            <h4 className="text-sm font-bold mb-1" style={{color:activeCorr===c.id?"#fff":NAVY}}>{c.name}</h4>
            {c.vol&&<span className="text-lg font-bold" style={{color:activeCorr===c.id?AMBER:NAVY}}>{c.vol} <span className="text-xs font-normal" style={{color:activeCorr===c.id?"#8BAFD4":MUTED}}>млн т</span></span>}
            {!c.vol&&<span className="text-xs" style={{color:MUTED}}>Объём не опубликован</span>}
          </button>))}
        </div>
        {activeCorrData&&(<div className="rounded-xl p-5 mb-6" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <h4 className="text-sm font-bold mb-3" style={{color:NAVY}}>{activeCorrData.name}</h4>
              <div className="text-xs leading-relaxed mb-4" style={{color:MUTED}}><span className="font-medium" style={{color:NAVY}}>Маршрут: </span>{activeCorrData.route}</div>
              <div className="flex flex-wrap gap-3">
                {activeCorrData.vol&&<div className="px-3 py-2 rounded-lg" style={{background:LIGHT_BG}}><div className="text-xs" style={{color:MUTED}}>Объём 2024</div><div className="text-lg font-bold" style={{color:NAVY}}>{activeCorrData.vol} млн т</div></div>}
                {activeCorrData.target&&<div className="px-3 py-2 rounded-lg" style={{background:LIGHT_BG}}><div className="text-xs" style={{color:MUTED}}>Таргет 2030</div><div className="text-lg font-bold" style={{color:AMBER}}>{activeCorrData.target} млн т</div></div>}
                {activeCorrData.teu&&<div className="px-3 py-2 rounded-lg" style={{background:LIGHT_BG}}><div className="text-xs" style={{color:MUTED}}>Контейнеры 2024</div><div className="text-lg font-bold" style={{color:NAVY}}>{activeCorrData.teu.toLocaleString()} ДФЭ</div></div>}
                {activeCorrData.growth&&<div className="px-3 py-2 rounded-lg" style={{background:LIGHT_BG}}><div className="text-xs" style={{color:MUTED}}>Динамика</div><div className="text-lg font-bold" style={{color:activeCorrData.status==="disrupted"?"#E74C3C":"#27AE60"}}>{activeCorrData.growth}</div></div>}
              </div>
            </div>
            <div><div className="text-xs font-bold uppercase tracking-wider mb-2" style={{color:MUTED}}>Узкие места</div><div className="text-xs leading-relaxed p-3 rounded-lg" style={{background:"#FFF8EC",color:"#8B6914",border:"1px solid #F5E6C4"}}>{activeCorrData.bottleneck}</div></div>
          </div>
        </div>)}

        {/* S4: Economic Context */}
        <SectionTitle number={4} title="Экономический контекст" subtitle="Транспорт как часть экономической системы Казахстана"/>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div className="rounded-xl p-5" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
            <h3 className="text-xs font-bold uppercase tracking-wider mb-4" style={{color:MUTED}}>Топ-10 торговых партнёров, 2024 ($ млрд)</h3>
            <div className="space-y-2">
              {TRADE_PARTNERS.map((p,i)=>{const total=p.exp+p.imp;const maxVal=TRADE_PARTNERS[0].exp+TRADE_PARTNERS[0].imp;return(
                <div key={i} className="flex items-center gap-2"><span className="text-sm w-5">{p.flag}</span><span className="text-xs w-24 truncate" style={{color:NAVY}}>{p.country}</span>
                <div className="flex-1 flex h-4 rounded-sm overflow-hidden" style={{background:"#F0F2F5"}}><div style={{width:p.exp/maxVal*100+"%",background:NAVY}}/><div style={{width:p.imp/maxVal*100+"%",background:AMBER}}/></div>
                <span className="text-xs font-medium w-10 text-right" style={{color:NAVY}}>{(total/1000).toFixed(1)}</span></div>)})}
            </div>
            <div className="flex gap-4 mt-3 justify-center"><div className="flex items-center gap-1 text-xs"><span className="w-3 h-2 rounded-sm" style={{background:NAVY}}/> <span style={{color:MUTED}}>Экспорт</span></div><div className="flex items-center gap-1 text-xs"><span className="w-3 h-2 rounded-sm" style={{background:AMBER}}/> <span style={{color:MUTED}}>Импорт</span></div></div>
          </div>
          <div className="rounded-xl p-5" style={{background:CARD_BG,border:"1px solid #E8ECF0"}}>
            <h3 className="text-xs font-bold uppercase tracking-wider mb-4" style={{color:MUTED}}>Структура экспорта, 2024</h3>
            <ResponsiveContainer width="100%" height={220}>
              <PieChart><Pie data={EXPORT_STRUCTURE} cx="50%" cy="50%" outerRadius={75} dataKey="pct" label={({name,pct})=>pct+"%"} labelLine={false}>{EXPORT_STRUCTURE.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Tooltip formatter={(v)=>v+"%"}/></PieChart>
            </ResponsiveContainer>
            <div className="flex flex-wrap gap-x-3 gap-y-1 mt-12 justify-center">{EXPORT_STRUCTURE.map((d,i)=>(<div key={i} className="flex items-center gap-1 text-xs"><span className="w-2 h-2 rounded-full" style={{background:d.color}}/><span style={{color:MUTED}}>{d.name}</span></div>))}</div>
          </div>
        </div>

        {/* S5: Industrialization Map */}
        <IndustrializationMap/>

        {/* FOOTER */}
        <div className="text-center pt-4 pb-6 border-t" style={{borderColor:"#E8ECF0"}}>
          <p className="text-xs" style={{color:MUTED}}>Источники: Бюро национальной статистики РК (stat.gov.kz) · КТЖ · Ассоциация ТМТМ · Комитет госдоходов МФ РК</p>
          <p className="text-xs mt-1" style={{color:"#B0BEC5"}}>Alvarez & Marsal · Март 2026</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
