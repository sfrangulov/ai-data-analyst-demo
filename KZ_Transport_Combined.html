<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Казахстан — Транспортная модель | A&M</title>
<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #F7F9FC; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; }
* { box-sizing: border-box; }

.top-nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
  display: flex; align-items: center; gap: 2px;
  background: #fff; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(15,36,64,0.10), 0 0 0 1px rgba(0,0,0,0.04);
  padding: 3px;
}
.top-nav-tab {
  padding: 7px 16px; border-radius: 8px; border: none;
  font-size: 11px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  background: transparent; color: #6B7B8D;
}
.top-nav-tab:hover { background: #F0F2F5; color: #1B3A6B; }
.top-nav-tab.active { background: #1B3A6B; color: #fff; }
.top-nav-sep {
  width: 1px; height: 20px; background: #E8ECF0; margin: 0 2px; flex-shrink: 0;
}

.view-panel {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.view-panel.active { opacity: 1; pointer-events: auto; }
.view-panel iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="top-nav" id="topNav">
  <button class="top-nav-tab active" data-view="dashboard" onclick="switchTo('dashboard')">Обзор транспортной отрасли</button>
  <div class="top-nav-sep"></div>
  <button class="top-nav-tab" data-slide="0" onclick="switchTo('slide',0)">Аналитические инструменты</button>
  <button class="top-nav-tab" data-slide="1" onclick="switchTo('slide',1)">Аналитический ассистент</button>
  <button class="top-nav-tab" data-slide="2" onclick="switchTo('slide',2)">Архитектура AI-платформы</button>
</div>

<div class="view-panel active" id="view-dashboard">
  <iframe src="KZ_Transport_Dashboard_v2.html"></iframe>
</div>
<div class="view-panel" id="view-slides">
  <iframe src="Status_Update_W8.html" id="slidesFrame"></iframe>
</div>

<script>
var activeView = 'dashboard';
var currentSlide = 0;

function switchTo(view, slideIdx) {
  // Update panels
  document.getElementById('view-dashboard').classList.toggle('active', view === 'dashboard');
  document.getElementById('view-slides').classList.toggle('active', view !== 'dashboard');
  activeView = view === 'dashboard' ? 'dashboard' : 'slides';

  // Navigate slide if needed
  if (view === 'slide' && typeof slideIdx === 'number') {
    currentSlide = slideIdx;
    var frame = document.getElementById('slidesFrame');
    frame.contentWindow.postMessage({ type: 'slideGoTo', idx: slideIdx }, '*');
  }

  // Update tab highlights
  updateTabs(view === 'dashboard' ? -1 : slideIdx);
}

function updateTabs(slideIdx) {
  var tabs = document.querySelectorAll('.top-nav-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  if (slideIdx === -1 || slideIdx === undefined) {
    document.querySelector('[data-view="dashboard"]').classList.add('active');
  } else {
    var st = document.querySelector('[data-slide="' + slideIdx + '"]');
    if (st) st.classList.add('active');
  }
}

// Listen for slide changes from iframe (arrow keys inside iframe)
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'slideChange') {
    currentSlide = e.data.current;
    if (activeView === 'slides') updateTabs(currentSlide);
  }
});

document.addEventListener('keydown', function(e) {
  if (activeView === 'slides') {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      document.getElementById('slidesFrame').contentWindow.postMessage({ type: 'slideGo', dir: 1 }, '*');
    }
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      document.getElementById('slidesFrame').contentWindow.postMessage({ type: 'slideGo', dir: -1 }, '*');
    }
  }
});
</script>

</body>
</html>
