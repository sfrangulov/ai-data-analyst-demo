<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Казахстан — Транспортная модель | A&M</title>
<style>
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #F7F9FC; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; }
* { box-sizing: border-box; }

/* ── Top nav ── */
.top-nav {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
  display: flex; align-items: center; gap: 0;
  background: #fff; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(15,36,64,0.10), 0 0 0 1px rgba(0,0,0,0.04);
  padding: 3px;
}
.top-nav-tab {
  padding: 7px 20px; border-radius: 8px; border: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  background: transparent; color: #6B7B8D;
}
.top-nav-tab:hover { background: #F0F2F5; color: #1B3A6B; }
.top-nav-tab.active { background: #1B3A6B; color: #fff; }

/* ── Slide controls (inside top-nav) ── */
.slide-controls {
  display: flex; align-items: center; gap: 6px;
  margin-left: 4px; padding-left: 8px;
  border-left: 1px solid #E8ECF0;
  opacity: 0; pointer-events: none; max-width: 0; overflow: hidden;
  transition: opacity 0.3s, max-width 0.3s;
}
.slide-controls.visible {
  opacity: 1; pointer-events: auto; max-width: 300px;
}
.sc-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid #D0DDE8;
  background: #fff; color: #1B3A6B; font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; padding: 0;
}
.sc-btn:hover { background: #1B3A6B; color: #fff; border-color: #1B3A6B; }
.sc-btn:disabled { opacity: 0.25; cursor: default; background: #fff; color: #1B3A6B; }
.sc-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #D0DDE8; border: none; cursor: pointer;
  transition: all 0.25s; padding: 0;
}
.sc-dot.active { background: #F5A623; transform: scale(1.35); }
.sc-counter { font-size: 10px; color: #6B7B8D; min-width: 24px; text-align: center; }

/* ── Views ── */
.view-panel {
  position: absolute; inset: 0;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
.view-panel.active { opacity: 1; pointer-events: auto; }
.view-panel iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<!-- Navigation -->
<div class="top-nav" id="topNav">
  <button class="top-nav-tab active" data-view="dashboard" onclick="switchView('dashboard')">Обзор транспортной отрасли</button>
  <button class="top-nav-tab" data-view="slides" onclick="switchView('slides')">Оптимизационный анализ</button>
  <div class="slide-controls" id="slideControls">
    <button class="sc-btn" id="scPrev" onclick="slideCmd('slideGo',{dir:-1})">&#8249;</button>
    <div id="scDots" style="display:flex;gap:5px;align-items:center;"></div>
    <span class="sc-counter" id="scCounter">1/3</span>
    <button class="sc-btn" id="scNext" onclick="slideCmd('slideGo',{dir:1})">&#8250;</button>
  </div>
</div>

<!-- Dashboard -->
<div class="view-panel active" id="view-dashboard">
  <iframe src="KZ_Transport_Dashboard_v2.html" id="dashboardFrame"></iframe>
</div>

<!-- Slides -->
<div class="view-panel" id="view-slides">
  <iframe src="Status_Update_W8.html" id="slidesFrame"></iframe>
</div>

<script>
let activeView = 'dashboard';

function switchView(view) {
  activeView = view;
  document.querySelectorAll('.view-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.top-nav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('view-' + view).classList.add('active');
  document.querySelector('[data-view="' + view + '"]').classList.add('active');
  document.getElementById('slideControls').classList.toggle('visible', view === 'slides');
  if (view === 'slides') slideCmd('slideGetState');
}

function slideCmd(type, extra) {
  var frame = document.getElementById('slidesFrame');
  var msg = Object.assign({ type: type }, extra || {});
  frame.contentWindow.postMessage(msg, '*');
}

// Listen for state updates from slides iframe
window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'slideChange') {
    updateSlideControls(e.data.current, e.data.total);
  }
});

function buildDots(total, current) {
  var container = document.getElementById('scDots');
  // Remove existing dots
  while (container.firstChild) container.removeChild(container.firstChild);
  // Create new dots
  for (var i = 0; i < total; i++) {
    var d = document.createElement('button');
    d.className = 'sc-dot' + (i === current ? ' active' : '');
    d.setAttribute('data-idx', i);
    d.onclick = function() { slideCmd('slideGoTo', { idx: parseInt(this.getAttribute('data-idx')) }); };
    container.appendChild(d);
  }
}

function updateSlideControls(current, total) {
  document.getElementById('scCounter').textContent = (current + 1) + '/' + total;
  document.getElementById('scPrev').disabled = current === 0;
  document.getElementById('scNext').disabled = current === total - 1;

  var container = document.getElementById('scDots');
  if (container.children.length !== total) {
    buildDots(total, current);
  } else {
    for (var i = 0; i < container.children.length; i++) {
      container.children[i].classList.toggle('active', i === current);
    }
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === '1') switchView('dashboard');
  if (e.key === '2') switchView('slides');
  if (activeView === 'slides') {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); slideCmd('slideGo', { dir: 1 }); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); slideCmd('slideGo', { dir: -1 }); }
  }
});
</script>

</body>
</html>
